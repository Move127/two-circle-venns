<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venn Diagram Drill — Categorical Logic</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4EE;
    --surface: #FFFFFF;
    --surface2: #F0ECE4;
    --surface3: #E8E3D8;
    --ink: #1A1714;
    --ink2: #5A5650;
    --ink3: #9A948E;
    --accent: #2B4C7E;
    --accent-light: #E6EEF8;
    --success: #2D6A4F;
    --success-bg: #D8F3DC;
    --danger: #A82020;
    --danger-bg: #FDECEA;
    --warn: #7D4E00;
    --warn-bg: #FFF3CD;
    --border: rgba(0,0,0,0.10);
    --border-hi: rgba(0,0,0,0.15);
    --radius: 10px;
    --radius-lg: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Instrument Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.4rem;
    letter-spacing: -0.5px;
    color: var(--ink);
    line-height: 1.1;
  }

  header h1 em { font-style: italic; color: var(--accent); }

  header p {
    font-size: 0.875rem;
    color: var(--ink3);
    margin-top: 0.4rem;
  }

  .container { width: 100%; max-width: 680px; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.7rem;
    text-align: center;
  }

  .stat-value {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--ink);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.62rem;
    color: var(--ink3);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 0.2rem;
  }

  .progress-wrap { margin-bottom: 1.5rem; }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--ink3);
    margin-bottom: 0.4rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
  }

  .progress-track {
    height: 4px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .woodpecker-notice {
    font-size: 0.75rem;
    color: var(--warn);
    background: var(--warn-bg);
    border-radius: var(--radius);
    padding: 0.5rem 0.85rem;
    margin-bottom: 1rem;
    font-family: 'DM Mono', monospace;
    display: none;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    padding: 1.75rem;
    margin-bottom: 0.75rem;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    opacity: 0.6;
  }

  .card-label {
    font-size: 0.68rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    color: var(--ink3);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .stmt-box {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    font-family: 'DM Mono', monospace;
    font-size: 1.05rem;
    color: var(--ink);
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }

  .question {
    font-size: 1rem;
    color: var(--ink2);
    margin-bottom: 1.25rem;
    font-style: italic;
    font-family: 'DM Serif Display', serif;
  }

  /* 3x2 grid of venn options */
  .venn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }

  .venn-option {
    border: 2px solid var(--border-hi);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    padding: 0.6rem 0.6rem 0.5rem;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.35rem;
  }

  .venn-option:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--accent-light);
    transform: translateY(-1px);
  }

  .venn-option canvas {
    display: block;
    border-radius: 6px;
  }

  .venn-option .opt-label {
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    color: var(--ink3);
    letter-spacing: 0.05em;
  }

  .venn-option.correct {
    border-color: var(--success);
    background: var(--success-bg);
  }

  .venn-option.wrong {
    border-color: var(--danger);
    background: var(--danger-bg);
  }

  .venn-option.reveal-correct {
    border-color: var(--success);
    background: var(--success-bg);
  }

  .venn-option:disabled { cursor: default; pointer-events: none; }

  .feedback {
    display: none;
    border-radius: var(--radius);
    padding: 0.9rem 1.1rem;
    font-size: 0.875rem;
    line-height: 1.6;
    margin-top: 0.5rem;
  }

  .feedback.correct { display: block; background: var(--success-bg); color: var(--success); }
  .feedback.wrong   { display: block; background: var(--danger-bg);  color: var(--danger); }
  .feedback strong { font-weight: 600; }

  .next-btn {
    display: none;
    width: 100%;
    margin-top: 1rem;
    padding: 0.85rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.01em;
  }

  .next-btn:hover { opacity: 0.9; transform: translateY(-1px); }

  #complete-screen {
    display: none;
    text-align: center;
    padding: 3rem 2rem;
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
  }

  #complete-screen h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    margin-bottom: 0.5rem;
  }

  #complete-screen p { color: var(--ink2); margin-bottom: 1.5rem; font-size: 0.9rem; }

  #complete-screen button {
    padding: 0.75rem 2rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
  }

  @media (max-width: 480px) {
    header h1 { font-size: 1.8rem; }
    .card { padding: 1.1rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Venn <em>Diagrams</em></h1>
  <p>Match categorical statements to their correct diagram</p>
</header>

<div class="container">
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="s-correct">0</div>
      <div class="stat-label">Correct</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="s-streak">0</div>
      <div class="stat-label">Streak</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="s-remaining">—</div>
      <div class="stat-label">Remaining</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="prog-label">Question 1</span>
      <span id="prog-pct">0% mastered</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="woodpecker-notice" id="wp-notice">↩ Revisiting a missed form — woodpecker mode</div>

  <div class="card" id="question-card">
    <div class="card-label">Identify the Venn diagram</div>
    <div class="stmt-box" id="stmt-box"></div>
    <div class="question">Which diagram correctly represents this statement?</div>
    <div class="venn-grid" id="venn-grid"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn">Next question →</button>
  </div>

  <div id="complete-screen">
    <h2>All forms mastered!</h2>
    <p id="complete-msg"></p>
    <button onclick="init()">Drill again</button>
  </div>
</div>

<script>
// ─── Venn diagram rendering ───────────────────────────────────────────────────
// Diagram types:
//   'A'       → shade S-only (inside S, outside P)
//   'E'       → shade intersection
//   'P_ONLY'  → shade P-only (inside P, outside S)
//   'OUTSIDE' → shade outside both circles
//   'I'       → X in intersection
//   'O'       → X in S-only
//   'X_P'     → X in P-only
//   'X_OUT'   → X outside both circles

const W = 180, H = 110;
const R = 38;
const CY = H / 2;
const OFFSET = 24;
const SCX = W/2 - OFFSET;
const PCX = W/2 + OFFSET;

const SHADE_COLOR = 'rgba(43, 76, 126, 0.22)';
const STROKE_COLOR = '#2B4C7E';
const LABEL_COLOR = '#5A5650';
const X_COLOR = '#A82020';

function drawVenn(canvas, type) {
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const d = PCX - SCX;
  const alpha = Math.acos((d / 2) / R);
  const chordX = SCX + d / 2;

  // Step 1: background shading (drawn before circles)
  if (type === 'OUTSIDE') {
    ctx.fillStyle = SHADE_COLOR;
    ctx.fillRect(0, 0, W, H);
  }

  // Step 2: white fill both circles (covers background shading inside circles)
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath(); ctx.arc(SCX, CY, R, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(PCX, CY, R, 0, Math.PI * 2); ctx.fill();

  // Step 3: interior shading (drawn after white fill, inside circles only)
  ctx.fillStyle = SHADE_COLOR;

  if (type === 'A') {
    // S-only crescent: long left arc of S, closed by short left arc of P
    ctx.beginPath();
    ctx.arc(SCX, CY, R, -alpha, alpha, true);
    ctx.arc(PCX, CY, R, Math.PI - alpha, -(Math.PI - alpha), false);
    ctx.closePath();
    ctx.fill();
  }

  if (type === 'E') {
    // Intersection lens: short right arc of S + short left arc of P
    ctx.beginPath();
    ctx.arc(SCX, CY, R, -alpha, alpha, false);
    ctx.arc(PCX, CY, R, Math.PI - alpha, Math.PI + alpha, false);
    ctx.closePath();
    ctx.fill();
  }

  if (type === 'P_ONLY') {
    // P-only crescent: the right bulge of P, outside S.
    // From P's center, intersection points are at -(π-α) (upper) and +(π-α) (lower).
    // Right side of P = arc from upper -(π-α) going clockwise (through 0) to lower +(π-α).
    // anticlockwise=false, from -(π-α) to +(π-α) clockwise sweeps the RIGHT side of P. ✓
    // Then close with S's short right arc from lower +alpha back to upper -alpha.
    ctx.beginPath();
    ctx.arc(PCX, CY, R, -(Math.PI - alpha), Math.PI - alpha, false);
    ctx.arc(SCX, CY, R, alpha, -alpha, false);
    ctx.closePath();
    ctx.fill();
  }

  // Step 4: circle outlines
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = STROKE_COLOR;
  ctx.beginPath(); ctx.arc(SCX, CY, R, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(PCX, CY, R, 0, Math.PI * 2); ctx.stroke();

  // Step 5: X marks
  if (type === 'I')     drawX(ctx, (SCX + PCX) / 2, CY);
  if (type === 'O')     drawX(ctx, (SCX - R + chordX) / 2, CY);
  if (type === 'X_P')   drawX(ctx, (chordX + PCX + R) / 2, CY);
  if (type === 'X_OUT') drawX(ctx, 12, 13);

  // Step 6: labels
  ctx.fillStyle = LABEL_COLOR;
  ctx.font = "500 11px 'DM Mono', monospace";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('S', SCX - R + 8, CY);
  ctx.fillText('P', PCX + R - 8, CY);
}

function drawX(ctx, x, y) {
  const s = 7;
  ctx.save();
  ctx.strokeStyle = X_COLOR;
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x - s, y - s); ctx.lineTo(x + s, y + s); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + s, y - s); ctx.lineTo(x - s, y + s); ctx.stroke();
  ctx.restore();
}

// ─── All 8 diagram types ──────────────────────────────────────────────────────
const ALL_DIAGRAM_TYPES = ['A', 'E', 'P_ONLY', 'OUTSIDE', 'I', 'O', 'X_P', 'X_OUT'];

const DIAGRAM_LABELS = {
  A:       'S-only shaded',
  E:       'Intersection shaded',
  P_ONLY:  'P-only shaded',
  OUTSIDE: 'Outside both shaded',
  I:       'X in intersection',
  O:       'X in S-only',
  X_P:     'X in P-only',
  X_OUT:   'X outside both',
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// Negation map: "It's false that" flips A↔O and E↔I
const NEGATION_MAP = { A: 'O', E: 'I', I: 'E', O: 'A' };

// Explanation for each diagram type
const DIAGRAM_EXPLANATIONS = {
  A:       'The S-only region is shaded — no members of S exist outside P.',
  E:       'The intersection is shaded — nothing belongs to both S and P.',
  P_ONLY:  'The P-only region is shaded — no members of P exist outside S.',
  OUTSIDE: 'The region outside both circles is shaded — nothing exists outside S or P.',
  I:       'An X marks the intersection — something exists in both S and P.',
  O:       'An X marks the S-only region — something in S is not in P.',
  X_P:     'An X marks the P-only region — something in P is not in S.',
  X_OUT:   'An X marks the region outside both — something exists outside both S and P.',
};

function makeStatement(targetDiagram) {
  const useNonS = Math.random() < 0.35;
  const useNonP = Math.random() < 0.35;
  const S = useNonS ? 'non-S' : 'S';
  const P = useNonP ? 'non-P' : 'P';

  const useFalse = Math.random() < 0.4;

  let baseForm, negated;
  if (useFalse) {
    baseForm = Object.keys(NEGATION_MAP).find(f => NEGATION_MAP[f] === targetDiagram);
    negated = true;
  } else {
    baseForm = targetDiagram;
    negated = false;
  }

  let core;
  if (baseForm === 'A') core = `All ${S} are ${P}`;
  if (baseForm === 'E') core = `No ${S} are ${P}`;
  if (baseForm === 'I') core = `Some ${S} are ${P}`;
  if (baseForm === 'O') core = `Some ${S} are not ${P}`;

  const text = negated ? `It's false that ${core.toLowerCase()}.` : `${core}.`;
  return { text, targetDiagram };
}

// ─── Woodpecker engine ────────────────────────────────────────────────────────
// Track mastery per diagram type (only the 4 that can be correct answers: A, E, I, O)
const MASTERY_TYPES = ['A', 'E', 'I', 'O'];
const CONSEC_NEEDED = 5;

let state = {};
let queue = [];
let totalCorrect = 0, streak = 0, asked = 0;
let currentDiagram = null;

function masteredCount() { return MASTERY_TYPES.filter(t => state[t]?.mastered).length; }
function remainingCount() { return MASTERY_TYPES.length - masteredCount(); }

function init() {
  state = {};
  MASTERY_TYPES.forEach(t => { state[t] = { consecutive: 0, mastered: false, missCount: 0 }; });
  queue = shuffle([...MASTERY_TYPES]);
  totalCorrect = 0; streak = 0; asked = 0;
  document.getElementById('complete-screen').style.display = 'none';
  document.getElementById('question-card').style.display = 'block';
  updateStats();
  nextQuestion();
}

function nextQuestion() {
  queue = queue.filter(t => !state[t].mastered);
  if (queue.length === 0) { showComplete(); return; }

  currentDiagram = queue[0];
  queue.push(queue.shift());
  asked++;

  const isWoodpecker = state[currentDiagram].missCount > 0;
  document.getElementById('wp-notice').style.display = isWoodpecker ? 'block' : 'none';

  const stmt = makeStatement(currentDiagram);
  document.getElementById('stmt-box').textContent = stmt.text;

  // Build 6 options: correct + 5 distractors from the other 7 diagram types
  const distractors = shuffle(ALL_DIAGRAM_TYPES.filter(t => t !== currentDiagram)).slice(0, 5);
  const options = shuffle([currentDiagram, ...distractors]);

  renderOptions(options, currentDiagram);
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('next-btn').style.display = 'none';

  updateStats();
  updateProgress();
}

function renderOptions(options, correctType) {
  const grid = document.getElementById('venn-grid');
  grid.innerHTML = '';

  options.forEach(type => {
    const btn = document.createElement('button');
    btn.className = 'venn-option';
    btn.dataset.type = type;

    const canvas = document.createElement('canvas');
    btn.appendChild(canvas);

    const label = document.createElement('span');
    label.className = 'opt-label';
    label.textContent = DIAGRAM_LABELS[type];
    btn.appendChild(label);

    btn.addEventListener('click', () => handleChoice(type, correctType));
    grid.appendChild(btn);
    drawVenn(canvas, type);
  });
}

function handleChoice(chosen, correct) {
  const isCorrect = chosen === correct;
  document.querySelectorAll('.venn-option').forEach(btn => {
    btn.disabled = true;
    const t = btn.dataset.type;
    if (t === correct && isCorrect) btn.classList.add('correct');
    else if (t === correct && !isCorrect) btn.classList.add('reveal-correct');
    else if (t === chosen && !isCorrect) btn.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    state[correct].consecutive++;
    if (state[correct].consecutive >= CONSEC_NEEDED) state[correct].mastered = true;
    totalCorrect++;
    streak++;
    fb.className = 'feedback correct';
    fb.innerHTML = `<strong>Correct!</strong> ${DIAGRAM_EXPLANATIONS[correct]}${state[correct].mastered ? ' <strong>Form mastered!</strong>' : ''}`;
  } else {
    state[correct].consecutive = 0;
    state[correct].missCount++;
    streak = 0;
    queue = queue.filter(t => t !== correct);
    queue.unshift(correct);
    fb.className = 'feedback wrong';
    fb.innerHTML = `<strong>Not quite.</strong> The correct diagram: ${DIAGRAM_EXPLANATIONS[correct]}`;
  }

  document.getElementById('next-btn').style.display = 'block';
  updateStats();
}

function updateStats() {
  document.getElementById('s-correct').textContent = totalCorrect;
  document.getElementById('s-streak').textContent = streak;
  document.getElementById('s-remaining').textContent = remainingCount();
}

function updateProgress() {
  const pct = Math.round((masteredCount() / MASTERY_TYPES.length) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `Question ${asked}`;
  document.getElementById('prog-pct').textContent = pct + '% mastered';
}

function showComplete() {
  document.getElementById('question-card').style.display = 'none';
  document.getElementById('complete-screen').style.display = 'block';
  document.getElementById('complete-msg').textContent =
    `You answered ${totalCorrect} questions correctly in ${asked} attempts, mastering all four categorical forms.`;
}

document.getElementById('next-btn').addEventListener('click', nextQuestion);
init();
</script>
</body>
</html>
